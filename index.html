<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yu-Gi-Oh! Collection Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
    <header>
        <div class="header-left">
            <h1>Yu-Gi-Oh! Collection Tracker</h1>
            <div class="portfolio-value">Total Value: <span id="totalValue">$0.00</span></div>
        </div>
        <div class="actions">
            <button id="exportBtn" class="btn primary">Export to CSV</button>
            <button id="clearLocalBtn" class="btn danger">Clear Local Additions</button>
        </div>
    </header>
    
    <main>
        <section class="add-card-section">
            <h2>Add New Card</h2>
            <form id="addCardForm">
                <input type="text" id="codeInput" placeholder="Set Code OR Card Name" required>
                <input type="number" id="quantityInput" placeholder="Qty" min="1" required value="1">
                <button type="submit" class="btn primary">Add to Tracker</button>
            </form>
            <div id="addStatus" style="margin-top: 10px; font-size: 0.9em; color: var(--danger);"></div>
        </section>

        <section class="controls-bar">
            <input type="text" id="searchInput" placeholder="Search name or code...">
            <select id="typeFilter">
                <option value="All">All Types</option>
                <option value="Monster">Monsters</option>
                <option value="Spell">Spells</option>
                <option value="Trap">Traps</option>
            </select>
            <select id="sortFilter">
                <option value="name_asc">Name (A-Z)</option>
                <option value="price_desc">Price (High to Low)</option>
                <option value="atk_desc">ATK (High to Low)</option>
                <option value="level_desc">Level/Rank (High to Low)</option>
                <option value="qty_desc">Quantity Owned</option>
            </select>
        </section>

        <section id="cardGrid" class="card-grid">
            <div style="grid-column: 1 / -1; text-align: center; color: #aaa;">Loading Card Database...</div>
        </section>
    </main>

    <div id="cardModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div class="modal-body">
                <div class="modal-image-container">
                    <img id="modalImage" src="" alt="Card Image">
                </div>
                <div class="modal-details">
                    <div class="modal-header-row">
                        <h2 id="modalName">Card Name</h2>
                        <div class="modal-price-badge" id="modalPrice">$0.00</div>
                    </div>
                    
                    <div class="modal-meta-line">
                        <span id="modalAttribute" class="badge"></span>
                        <span id="modalLevel" class="badge"></span>
                        <span id="modalRarity" class="badge rarity-badge"></span>
                    </div>

                    <div class="banlist-container" style="margin-bottom: 12px; display: flex; gap: 10px;">
                        <span class="badge" id="banTcg">TCG: 3️⃣ Unlim.</span>
                        <span class="badge" id="banOcg">OCG: 3️⃣ Unlim.</span>
                        <span class="badge" id="banMd">MD: 3️⃣ Unlim.</span>
                    </div>

                    <p><strong>[ <span id="modalRace"></span> / <span id="modalType"></span> ]</strong></p>
                    
                    <div class="modal-desc" id="modalDesc">Card description goes here.</div>
                    
                    <div class="modal-stats">
                        <span id="atkContainer"><strong>ATK/</strong> <span id="modalAtk"></span></span>
                        <span id="defContainer"><strong>DEF/</strong> <span id="modalDef"></span></span>
                    </div>
                    <hr>
                    <div class="modal-footer-info">
                        <p><strong>Your Printing:</strong> <span id="modalProduct"></span> (<span id="modalCode"></span>)</p>
                        <p><strong>First Released:</strong> <span id="modalFirstRelease"></span></p>
                        <p style="color:#aaa; font-size:0.85em; margin-top:10px;">Market Avg: <span id="modalTCG"></span> (NA) | <span id="modalCM"></span> (EU)</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
